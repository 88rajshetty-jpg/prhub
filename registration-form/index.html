<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respnsive Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <section class="container">
   <header class="text-center">Registration Form</header>
   <form action="#" class="form">

    <div class="input-box">
    <label style="color:white">Full Name</label>
    <input type="text" placeholder="Enter full name" required/>
    </div>

     <div class="input-box">
    <label style="color: white;">Email Address </label>
    <input type="text" placeholder="Enter email address">
    </div>

    <div class="column">
    <div class="input-box">
    <label style="color: white;">Phone number</label>
    <input type="number" placeholder="Enter Phone number">
    </div>
    
    <div class="input-box">
    <label style="color: white;">Birth date</label>
    <input type="date" placeholder="Enter birth date">
    </div>
    </div>

    <div class="gender-box">
        <h3 style="color: white;">Gender</h3>
        <div class="gender-option">
         <div class="gender">
            <input type="radio" id="check-male" name="gender">
            <label for="check-male">Male</label>
         </div>

         <div class="gender">
            <input type="radio" id="check-female" name="gender">
            <label for="check-male">Female</label>
         </div>

         <div class="gender">
            <input type="radio" id="check-other" name="gender">
            <label for="check-other">Prefer not say</label>
         </div>
        </div>
        </div>

        <div class="input-box address">
    <label style="color: white;">Address</label>
    <input type="text" placeholder="Enter Street address" required/>
    <input type="text" placeholder="Enter Street address line 2" required/>
    
      <div class="column">
     <div class="Select-box">
      <select name="country" required>
        <option value="" disabled selected hidden>Select Country</option>
        <option value="America">America</option>
        <option value="Japan">Japan</option>
        <option value="India">India</option>
        <option value="Nepal">Nepal</option>
      </select>
     </div>
      </div>

    <div class="column">
    <input type="text" placeholder="Enter your region " required/>
    <input type="number" placeholder="Enter postal code" required/>
    </div>
    </div>

    <button>Submit</button>
   </form>
  </div>
    </section>
    
    

 <script>
        
  setTimeout(()=> {

    document.getElementById("page").style.display="none";
  },500);
    </script>

    <script>
      setTimeout(()=>{
        document.querySelector('.page').style.position="relative";

        document.querySelector('.page').style.height="auto";   
         },);
    
    </script>

    
</body>
</html>
