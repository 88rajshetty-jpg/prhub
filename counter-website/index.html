<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Counter</h1>
    <h2 id="count">0</h2>

    <button id="increaseBtn" onclick="increase()">+</button>
    <button id="decrease" onclick="decrease()">-</button>
    
    <button id="resetplusbtn" onclick="resetplus()" style="display: none;" >Reset Plus</button>
    <button id="resetminusbtn" onclick="resetminus()" style="display: none;">Reset Minus</button>
    <button id="resetBothbtn" onclick="resetBoth()" style="display: none;">Reset All</button>

    <script src="script.js"></script>
</body>
</html>
