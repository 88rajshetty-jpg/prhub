<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Header */
header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

/* Auth Card */
.card {
  background: white;
  width: 100%;
  max-width: 400px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  padding: 30px;
}

.card h3 {
  text-align: center;
  color: #333;
  margin-bottom: 25px;
  font-size: 24px;
}

.card input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 15px;
  font-size: 14px;
  box-sizing: border-box;
}

.card input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
}

.btn-custom {
  width: 100%;
  padding: 12px !important;
  margin-bottom: 10px !important;
  font-weight: 600;
  border-radius: 12px !important;
}

#user {
  background: #f0f0f0;
  padding: 15px;
  border-radius: 12px;
  font-weight: 600;
  color: #333;
}
  </style>
</head>
<body>

<div class="card shadow">
  <h3>🔥 Firebase Auth</h3>

  <input type="email" id="email" class="form-control mb-2" placeholder="Enter Email">
  <input type="password" id="password" class="form-control mb-2" placeholder="Enter Password">

  <button class="btn btn-success btn-custom" onclick="signup()">Sign Up</button>
  <button class="btn btn-primary btn-custom" onclick="login()">Login</button>
  <button class="btn btn-danger btn-custom" onclick="logout()">Logout</button>
  <button class="btn btn-dark btn-custom" onclick="googleLogin()">
  Sign in with Google
</button>

  <p id="user" class="text-center mt-3"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCBPP1XsGnmLlXS4uVyevsA14kTR_FGnpA",
    authDomain: "fir-4d30e.firebaseapp.com",
    projectId: "fir-4d30e",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Signup
  window.signup=function() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Signup Successful ✅"))
      .catch(err => alert(err.message));
  };

  // Login
  window.login = function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("Login Successful ✅"))
      .catch(err => alert(err.message));
  };

  // Logout
  window.logout = function () {
    signOut(auth)
      .then(() => alert("Logged out ✅"));
  };

  window.googleLogin = function () {
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
    .then((result) => {
      alert("Google Login Successful ✅");
      console.log(result.user);
    })
    .catch((error) => {
      alert(error.message);
    });
};

  // Show logged in user
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("user").innerText = "Logged in as: " + user.email;
    } else {
      document.getElementById("user").innerText = "";
    }
  });

</script>

</body>
</html>
